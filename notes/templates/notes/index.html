
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'notes/styles.css' %}">
</head>
<body class="text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <!-- Brand -->
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span>My Notes</span>
            </a>

            <!-- Navbar Toggler for Mobile -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible Content -->
            <div class="collapse navbar-collapse" id="navbarContent">
                <!-- Spacer to push items to right -->
                <div class="ms-auto d-flex align-items-center gap-3">
                    <!-- Search Bar -->
                    <div class="input-group" style="width: 300px;">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="form-control search-input rounded-pill ps-3" 
                            placeholder="Search notes..."
                            aria-label="Search notes"
                        >
                    </div>

                    <!-- Create Note Button -->
                    <button id="createNoteBtn" class="btn btn-primary btn-sm fw-semibold" title="Create a new note">
                        ➕ New Note
                    </button>

                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="btn btn-outline-light btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;" title="Toggle dark/light mode">
                        🌙
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container-fluid px-4">
            <!-- Notes Grid -->
            <div id="notesGrid" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                <!-- Note cards will be dynamically added here -->
            </div>

            <!-- Empty State -->
            <div class="text-center mt-5" id="emptyState">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 1rem;">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <p class="fs-5">No notes yet. Create your first note to get started!</p>
            </div>
        </div>
    </main>

    <!-- Create/Edit Note Modal -->
    <div id="noteModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Create New Note</h5>
                    <button id="closeModal" type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="noteForm">
                    <div class="modal-body">
                        <input 
                            type="text" 
                            id="noteTitle" 
                            class="form-control mb-3" 
                            placeholder="Note Title"
                            required
                        >
                        <textarea 
                            id="noteContent" 
                            class="form-control" 
                            placeholder="Note Content"
                            rows="6"
                            required
                        ></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelBtn" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Note</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-wfSNq2Cq5/fQJHiN5PCHQGfINVZFr9l5bsJvV/jAGb7JhjNq2q7oGL0TqPZT+G5S" crossorigin="anonymous"></script>
    <script>
        // Optional: Add smooth fade-in animation to cards
        window.addEventListener('load', function() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.animation = `fadeIn 0.5s ease forwards ${index * 0.1}s`;
            });
        });
    </script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>
</html>
