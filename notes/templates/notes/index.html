<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root {
            --primary-dark: #1a1a2e;
            --secondary-dark: #16213e;
            --accent-blue: #0f4c75;
            --text-light: #e9ecef;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(90deg, var(--secondary-dark) 0%, var(--accent-blue) 100%);
            border-bottom: 2px solid var(--accent-blue);
            padding: 0.75rem 0;
        }

        .navbar-brand {
            font-size: 1.4rem !important;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
        }

        .search-input {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border: 1.5px solid rgba(255, 255, 255, 0.3) !important;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background-color: rgba(255, 255, 255, 0.25) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 0 10px rgba(15, 76, 117, 0.3);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0f4c75 0%, #1a7091 100%);
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1a7091 0%, #0f4c75 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 76, 117, 0.4);
        }

        .btn-outline-light {
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .btn-outline-light:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: rotate(20deg);
        }

        .search-group {
            min-width: 280px;
            max-width: 320px;
            width: 100%;
        }

        .theme-toggle-btn {
            width: 2.375rem;
            height: 2.375rem;
            padding: 0.375rem;
        }

        main {
            background: transparent;
            padding-top: 2rem;
            padding-bottom: 3rem;
        }

        .card {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.8) 0%, rgba(15, 76, 117, 0.1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 24px rgba(15, 76, 117, 0.3);
        }

        .card-title {
            color: var(--text-light);
            font-weight: 600;
        }

        .card-text {
            color: rgba(233, 236, 239, 0.8);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .card-footer {
            background: transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
        }

        .btn-sm {
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            background-color: rgba(233, 236, 239, 0.15);
            border: 1px solid rgba(233, 236, 239, 0.3);
        }

        .btn-secondary:hover {
            background-color: rgba(233, 236, 239, 0.25);
            transform: translateY(-2px);
        }

        .btn-danger {
            background-color: #dc3545;
            transition: all 0.2s ease;
        }

        .btn-danger:hover {
            background-color: #c82333;
            transform: translateY(-2px);
        }

        #emptyState {
            padding: 3rem 1rem;
            color: rgba(233, 236, 239, 0.6);
            font-size: 1.1rem;
        }

        .modal-content {
            background: var(--secondary-dark);
            border: 1px solid var(--accent-blue);
            color: var(--text-light);
        }

        .modal-header {
            border-bottom: 1px solid rgba(15, 76, 117, 0.5);
            background: rgba(15, 76, 117, 0.2);
        }

        .modal-footer {
            border-top: 1px solid rgba(15, 76, 117, 0.5);
            background: rgba(15, 76, 117, 0.1);
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-blue);
            color: var(--text-light);
            box-shadow: 0 0 10px rgba(15, 76, 117, 0.3);
        }

        .form-control::placeholder {
            color: rgba(233, 236, 239, 0.5);
        }

        .btn-close {
            filter: brightness(1.2);
        }
    </style>
</head>
<body class="text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <!-- Brand -->
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span>My Notes</span>
            </a>

            <!-- Navbar Toggler for Mobile -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible Content -->
            <div class="collapse navbar-collapse" id="navbarContent">
                <!-- Spacer to push items to right -->
                <div class="ms-auto d-flex align-items-center gap-3">
                    <!-- Search Bar -->
                    <div class="input-group" style="width: 300px;">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="form-control search-input rounded-pill ps-3" 
                            placeholder="Search notes..."
                            aria-label="Search notes"
                        >
                    </div>

                    <!-- Create Note Button -->
                    <button id="createNoteBtn" class="btn btn-primary btn-sm fw-semibold" title="Create a new note">
                        ➕ New Note
                    </button>

                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="btn btn-outline-light btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;" title="Toggle dark/light mode">
                        🌙
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container-fluid px-4">
            <!-- Notes Grid -->
            <div id="notesGrid" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                <!-- Note cards will be dynamically added here -->
            </div>

            <!-- Empty State -->
            <div class="text-center mt-5" id="emptyState">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 1rem;">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <p class="fs-5">No notes yet. Create your first note to get started!</p>
            </div>
        </div>
    </main>

    <!-- Create/Edit Note Modal -->
    <div id="noteModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Create New Note</h5>
                    <button id="closeModal" type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="noteForm">
                    <div class="modal-body">
                        <input 
                            type="text" 
                            id="noteTitle" 
                            class="form-control mb-3" 
                            placeholder="Note Title"
                            required
                        >
                        <textarea 
                            id="noteContent" 
                            class="form-control" 
                            placeholder="Note Content"
                            rows="6"
                            required
                        ></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelBtn" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Note</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-wfSNq2Cq5/fQJHiN5PCHQGfINVZFr9l5bsJvV/jAGb7JhjNq2q7oGL0TqPZT+G5S" crossorigin="anonymous"></script>
    <script>
        // Optional: Add smooth fade-in animation to cards
        window.addEventListener('load', function() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.animation = `fadeIn 0.5s ease forwards ${index * 0.1}s`;
            });
        });
    </script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>
</html>
