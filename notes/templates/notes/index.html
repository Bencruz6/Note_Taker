<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid d-flex justify-content-between">
            <a class="navbar-brand" href="#">My Notes</a>
            
            <div class="d-flex gap-3">
                <!-- Search Bar -->
                <div class="input-group" style="width: 300px;">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="form-control bg-secondary text-light border-secondary" 
                        placeholder="Search notes..."
                    >
                </div>

                <!-- Create Note Button -->
                <button id="createNoteBtn" class="btn btn-primary">
                    + New Note
                </button>

                <!-- Theme Toggle -->
                <button id="themeToggle" class="btn btn-outline-light">
                    🌙
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5 bg-dark">
        <div class="container-fluid">
            <!-- Notes Grid -->
            <div id="notesGrid" class="row row-cols-1 row-cols-md-3 g-4">
                <!-- Note cards will be dynamically added here -->
            </div>

            <!-- Empty State -->
            <div class="text-center mt-5" id="emptyState">
                <p>No notes yet. Create your first note to get started!</p>
            </div>
        </div>
    </main>

    <!-- Create/Edit Note Modal -->
    <div id="noteModal" class="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Create New Note</h5>
                    <button id="closeModal" type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="noteForm">
                    <div class="modal-body">
                        <input 
                            type="text" 
                            id="noteTitle" 
                            class="form-control mb-3" 
                            placeholder="Note Title"
                            required
                        >
                        <textarea 
                            id="noteContent" 
                            class="form-control" 
                            placeholder="Note Content"
                            rows="6"
                            required
                        ></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelBtn" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Note</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-wfSNq2Cq5/fQJHiN5PCHQGfINVZFr9l5bsJvV/jAGb7JhjNq2q7oGL0TqPZT+G5S" crossorigin="anonymous"></script>
</body>
</html>
